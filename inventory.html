<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Menicon Life Support Hub — 库存管理系统" />
  <title>库存管理 — Menicon Life</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>✦</text></svg>" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <a href="index.html" class="navbar__brand">
      <div class="navbar__brand-icon">M</div>
      <span>Menicon Life</span>
    </a>
    <div class="navbar__links" id="navLinks">
      <a href="index.html" class="navbar__link">首页</a>
      <a href="inventory.html" class="navbar__link active">库存管理</a>
      <a href="budget.html" class="navbar__link">预算管理</a>
    </div>
    <div class="navbar__actions">
      <span class="user-badge" id="userBadge">👤 管理员</span>
      <button class="btn btn--ghost btn--sm" onclick="handleLogout()">登出</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="admin-main">
    <div class="admin-container">

      <!-- Page Header -->
      <div class="admin-header">
        <div>
          <h1 class="admin-title">📊 库存管理</h1>
          <p class="admin-subtitle">管理所有免费品的库存数量，追踪入库与出库记录。</p>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid">
        <div class="stats-card">
          <div class="stats-card__label">总产品数</div>
          <div class="stats-card__value" id="statTotal">-</div>
        </div>
        <div class="stats-card stats-card--success">
          <div class="stats-card__label">库存充足</div>
          <div class="stats-card__value" id="statAvailable">-</div>
        </div>
        <div class="stats-card stats-card--warning">
          <div class="stats-card__label">库存紧张</div>
          <div class="stats-card__value" id="statLow">-</div>
        </div>
        <div class="stats-card stats-card--danger">
          <div class="stats-card__label">已售罄</div>
          <div class="stats-card__value" id="statOut">-</div>
        </div>
      </div>

      <!-- Inventory Table -->
      <div class="admin-card">
        <div class="admin-card__header">
          <h2>产品库存列表</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table" id="inventoryTable">
            <thead>
              <tr>
                <th>产品</th>
                <th>SKU</th>
                <th>当前库存</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="inventoryBody">
              <tr><td colspan="5" style="text-align:center; padding:2rem;">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Inventory Logs -->
      <div class="admin-card">
        <div class="admin-card__header">
          <h2>库存变动记录</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table" id="logsTable">
            <thead>
              <tr>
                <th>时间</th>
                <th>产品</th>
                <th>类型</th>
                <th>数量</th>
                <th>备注</th>
                <th>操作人</th>
              </tr>
            </thead>
            <tbody id="logsBody">
              <tr><td colspan="6" style="text-align:center; padding:2rem;">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <!-- Stock Change Modal -->
  <div class="modal-overlay" id="stockModal">
    <div class="modal" style="grid-template-columns: 1fr; max-width:480px;">
      <button class="modal__close" onclick="closeStockModal()">✕</button>
      <div class="modal__info" style="padding: var(--space-xl);">
        <h2 id="stockModalTitle">库存操作</h2>
        <input type="hidden" id="stockProductId" />
        <div class="form-group">
          <label>操作类型</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="stockType" value="in" checked /> 入库
            </label>
            <label class="radio-label">
              <input type="radio" name="stockType" value="out" /> 出库
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="stockQuantity">数量</label>
          <input type="number" id="stockQuantity" min="1" value="1" class="form-input" />
        </div>
        <div class="form-group">
          <label for="stockNote">备注</label>
          <input type="text" id="stockNote" placeholder="请输入备注（可选）" class="form-input" />
        </div>
        <button class="btn btn--primary" style="width:100%; margin-top: var(--space-md);" onclick="submitStockChange()">
          确认提交
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="inventory.js"></script>
</body>
</html>
